name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag'
        required: true
      branch:
        description: 'Push Changes Branch'
        default: 'master'
        required: true
      changelog:
        description: 'Catatan Perubahan'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wajib agar bot bisa push update.json dan create release

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Generate version date
      - name: Get Version
        id: get_version
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # 3. Update update.json, module.prop, and CHANGELOG.md
      - name: Update files
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          DATE_NUM="${{ steps.get_version.outputs.date }}"
          DATE_HUMAN=$(date +%d-%m-%Y)
          CHANGELOG="${{ github.event.inputs.changelog }}"

          # 1. Update module.prop menggunakan sed (Hati-hati dengan tanda kutip)
          sed -i "s/^version=.*/version=$VERSION/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$DATE_NUM/" module.prop
          
          # Gunakan logika sederhana untuk buildDate
          if grep -q "buildDate=" module.prop; then
            sed -i "s/^buildDate=.*/buildDate=$DATE_HUMAN/" module.prop
          else
            echo "buildDate=$DATE_HUMAN" >> module.prop
          fi

          # 2. Update update.json (Pastikan EOF tidak pakai kutip)
          cat > update.json <<EOF
          {
            "version": "$VERSION",
            "versionCode": "$DATE_NUM",
            "zipUrl": "https://github.com/QcomWrt/QTUN-TUNNELING/releases/download/$VERSION/QTUN-Magisk-$VERSION.zip",
            "changelog": "https://github.com/QcomWrt/QTUN-TUNNELING/raw/main/CHANGELOG.md"
          }
          EOF

          # 3. Update Changelog
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
          fi
          {
            echo "#### Changelog $VERSION - $DATE_HUMAN"
            echo "$CHANGELOG" | sed 's/^/- /'
            echo ""
            cat CHANGELOG.md
          } > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      # 4. Commit and push changes
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json module.prop CHANGELOG.md
          git commit -m "Release $VERSION" || echo "No changes to commit"
          git push origin "${{ github.event.inputs.branch }}"

      # 5. Build Module ZIP via build.sh
      - name: Build Module ZIP
        run: |
          chmod +x build.sh
          # Pastikan file lain executable sebelum masuk zip
          chmod +x customize.sh service.sh action.sh uninstall.sh
          [ -d "QTUN/bin" ] && chmod +x QTUN/bin/*
          [ -d "QTUN/scripts" ] && chmod +x QTUN/scripts/*
          
          ./build.sh

      # 6. Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          # Pakai wildcard lebih luas agar pasti ketemu filenya
          files: QTUN-Magisk-*.zip
          generate_release_notes: false
          body: |
            #### Changelog ${{ github.event.inputs.tag }}
            ${{ github.event.inputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}